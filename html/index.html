<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Rupee Media — Home</title>
    <meta name="description" content="One Rupee Media: Four divisions, one vision. Content creation, podcast production, photography, and creator community — all under one roof in Pokhara." />
    <meta property="og:title"       content="One Rupee Media" />
    <meta property="og:description" content="Four divisions. One vision. Pokhara, Nepal." />
    <meta property="og:type"        content="website" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/pages.css" />
  </head>
  <body>
    <div id="root"></div>

    <script>
      fetch('../components/navbar.html')
        .then((res) => res.text())
        .then((html) => {
          document.body.insertAdjacentHTML('afterbegin', html);
        });

      fetch('../components/footer.html')
        .then((res) => res.text())
        .then((html) => {
          document.body.insertAdjacentHTML('beforeend', html);
        });
    </script>

    <!-- ── JS: load order matters ── -->
    <!-- 1. Shared runtime (icons, state, router, nav, footer) -->
    <script src="../js/global.js"></script>
    <!-- 2. Page modules (each exposes a XxxPage() function) -->
    <script src="../js/home.js"></script>
    <script src="../js/media.js"></script>
    <script src="../js/podcast.js"></script>
    <script src="../js/production.js"></script>
    <script src="../js/social.js"></script>
    <script src="../js/about.js"></script>
    <script src="../js/contact.js"></script>
    <script src="../js/login.js"></script>
    <script src="../js/register.js"></script>
    <!-- 3. App entry point (router + render loop) — must be LAST -->
    <script src="../js/app.js"></script>
  </body>
</html>
